version: 2

builds:
  - id: gomexec
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
      - mips
      - mipsle
    goarm:
      - "7"
    gomips:
      - softfloat
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if .Mips }}_{{ .Mips }}{{ end }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: ohmymex
    name: gomexec
  draft: false
  prerelease: auto
